name: Daily Post Generator

on:
  schedule:
    # 매일 00:00 UTC = 09:00 KST
    - cron: "0 0 * * *"
  workflow_dispatch:        # 수동 실행 허용

permissions:
  contents: write           # 글 파일 커밋 권한

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Generate post
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          POST_CATEGORY: "auto"
        run: node scripts/generate-post.js

      - name: Commit new post
        run: |
          git config user.name  "bulllab-bot"
          git config user.email "bot@bulllab.kr"
          git add data/posts
          if git diff --cached --quiet; then
            echo "변경사항 없음 - 커밋 생략"
          else
            git commit -m "🔥 자동 글 생성 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
