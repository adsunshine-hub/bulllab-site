<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>코인 이슈 · 불장연구소</title>
<meta name="description" content="비트코인·이더리움 등 주요 코인 시장 이슈를 가볍게 정리." />
<meta name="theme-color" content="#0b0b0d" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🔥</text></svg>" />
<link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
<header id="site-header"></header>

<section class="hero">
  <div class="container">
    <h1>🪙 <span class="fire">코인</span> 이슈</h1>
    <p>BTC·ETH·알트코인 시장에서 화제가 된 이슈를 매일 모아드립니다.</p>
  </div>
</section>

<div class="container"><div class="ad-slot ad-top" data-ad="top"></div></div>

<main class="container layout">
  <div>
    <section class="section">
      <div class="section-head"><h2>최신 코인 이슈</h2></div>
      <div id="cards-coin" class="cards"></div>
    </section>
    <div class="ad-slot ad-inarticle" data-ad="inarticle"></div>
    <section class="section">
      <div class="section-head"><h2>코인 이슈 전체</h2></div>
      <div id="list-coin"></div>
    </section>
    <div class="ad-slot ad-bottom" data-ad="bottom"></div>
  </div>
  <aside class="sidebar">
    <div class="ad-slot ad-side ad-side-top" data-ad="sideTop"></div>
    <div class="widget">
      <h4>🪙 코인이란?</h4>
      <p style="margin:0;color:var(--text-dim);font-size:13.5px;line-height:1.7;">
        가상자산 거래는 가격 변동성이 매우 크며 원금 손실이 발생할 수 있습니다.
        본 사이트의 모든 글은 정보 전달 목적이며 매매 권유가 아닙니다.
      </p>
    </div>
    <div class="ad-slot ad-side ad-side-bottom" data-ad="sideBottom"></div>
  </aside>
</main>

<div class="ad-slot ad-mobile-fixed" data-ad="mobileFixed"></div>

<footer id="site-footer"></footer>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/posts.js"></script>
<script src="../assets/js/ads.js"></script>
<script>
  BullLab.loadCategoryCards("cards-coin", "coin", 6);
  BullLab.loadCategoryList("list-coin", "coin", 50);
</script>
</body>
</html>
